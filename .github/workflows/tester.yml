name: Test Proxies

on:
  workflow_dispatch:

jobs:
  prepare-matrix:
    name: Generate Chunks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - id: set-matrix
        name: Generate matrix bounds
        run: |
          cat <<'EOF' > matrix_gen.py
          import base64, math, sys, json
          try:
              with open('./sub/sub_merge_base64.txt', 'r') as f:
                  b64 = f.read().strip()
              if not b64:
                  print("Base64 file is empty.")
                  sys.exit(1)
              
              decoded = base64.b64decode(b64).decode('utf-8', errors='ignore')
              lines = [l for l in decoded.splitlines() if l.strip()]
              total = len(lines)
              
              if total == 0:
                  print("Decoded file contains no valid proxy links.")
                  sys.exit(1)
                  
              print(f"Total proxies found: {total}")
              
              workers = 20
              chunk_size = math.ceil(total / workers)
              chunks = []
              
              for i in range(0, total, chunk_size):
                  chunks.append({"start": i, "end": min(i + chunk_size, total)})
              
              with open('matrix.json', 'w') as f:
                  json.dump({"include": chunks}, f)
          except Exception as e:
              print(f"Error during matrix generation: {e}")
              sys.exit(1)
          EOF
          
          if python matrix_gen.py; then
            MATRIX_STR=$(cat matrix.json)
            echo "matrix=$MATRIX_STR" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          fi

  test-chunk:
    name: Test Nodes (${{ matrix.start }} to ${{ matrix.end }})
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download Xray Core
        run: |
          wget -O xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip xray.zip xray
          chmod +x xray

      - name: Prepare Chunk
        run: |
          python -c "import base64; open('proxies.txt', 'w', encoding='utf-8').write(base64.b64decode(open('./sub/sub_merge_base64.txt').read().strip()).decode('utf-8', errors='ignore'))"

      - name: Run Xray Tester
        run: |
          cat <<'EOF' > xray_tester.py
          import json, urllib.parse, base64, time, subprocess, concurrent.futures, requests, sys, socket

          ALLOWED_SS_METHODS = {
              "2022-blake3-aes-128-gcm", "2022-blake3-aes-256-gcm", "2022-blake3-chacha20-poly1305",
              "aes-256-gcm", "aes-128-gcm", "chacha20-poly1305", "chacha20-ietf-poly1305",
              "xchacha20-poly1305", "xchacha20-ietf-poly1305", "none", "plain"
          }

          def clean_str(s):
              if not s: return ""
              s = str(s).strip()
              for _ in range(4): 
                  unq = urllib.parse.unquote(s)
                  if unq == s: break
                  s = unq
              return s

          def clean_path(s):
              s = clean_str(s)
              if not s.startswith('/'): s = '/' + s
              return s

          def is_valid_uuid_or_id(s):
              if not s: return False
              s = s.strip()
              if len(s) == 36:
                  parts = s.split('-')
                  if len(parts) == 5 and [len(p) for p in parts] == [8, 4, 4, 4, 12]:
                      try:
                          int(s.replace('-', ''), 16)
                          return True
                      except ValueError: pass
              if len(s) == 32:
                  try:
                      int(s, 16)
                      return True
                  except ValueError: pass
              try:
                  if len(s.encode('utf-8')) <= 30:
                      return True
              except: pass
              return False

          def is_valid_reality_pbk(pbk):
              if not pbk: return False
              pbk = pbk.strip()
              pbk_pad = pbk.replace('-', '+').replace('_', '/')
              pbk_pad += '=' * (-len(pbk_pad) % 4)
              try:
                  decoded = base64.b64decode(pbk_pad)
                  if len(decoded) == 32:
                      return True
              except: pass
              return False

          def decode_base64(s):
              s = s.strip().split('#')[0]
              s += '=' * (-len(s) % 4)
              s = s.replace('-', '+').replace('_', '/')
              try: return base64.b64decode(s).decode('utf-8', errors='ignore')
              except: return ""

          def get_free_port():
              with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                  s.bind(('127.0.0.1', 0))
                  return s.getsockname()[1]

          def parse_vless(link, index):
              parsed = urllib.parse.urlparse(link)
              uuid, server = parsed.username, parsed.hostname
              if not uuid or not server: raise Exception("Invalid vless")
              if not is_valid_uuid_or_id(uuid): raise Exception("Invalid VLESS UUID")
              
              try: port = int(parsed.port or 443)
              except: port = 443
              if not (1 <= port <= 65535): raise Exception("Invalid port bounds")
              
              params = urllib.parse.parse_qs(parsed.query)
              name = urllib.parse.unquote(parsed.fragment) if parsed.fragment else f"proxy-{index}"

              allow_insecure = clean_str(params.get('allowInsecure', ['0'])[0]).lower()
              insecure = clean_str(params.get('insecure', ['0'])[0]).lower()
              if allow_insecure in ['1', 'true'] or insecure in ['1', 'true']:
                  raise Exception("Skipping insecure TLS node")
                  
              enc = clean_str(params.get('encryption', ['none'])[0]).lower()
              if enc != 'none': raise Exception(f"Invalid VLESS encryption: {enc}")

              net_type = clean_str(params.get('type', ['tcp'])[0]).lower()
              if net_type in ["http", "h2"]: net_type = "xhttp"
              if net_type not in ["tcp", "ws", "grpc", "httpupgrade", "xhttp", "quic"]:
                  raise Exception(f"Invalid VLESS network type: {net_type}")

              config = {
                  "tag": f"out-{index}", "protocol": "vless",
                  "settings": {
                      "vnext": [{"address": server, "port": port, "users": [{"id": uuid, "encryption": "none"}]}]
                  },
                  "streamSettings": {"network": net_type}
              }

              sec = clean_str(params.get('security', ['none'])[0]).lower()
              if sec not in ["none", "tls", "reality"]: raise Exception(f"Invalid VLESS security: {sec}")
              
              flow = clean_str(params.get('flow', [''])[0]).lower()
              if flow in ["xtls-rprx-vision", "xtls-rprx-vision-udp443"]:
                  # Fix: Xray panics if Vision is enabled without TLS/REALITY wrapping it
                  if sec in ['tls', 'reality']:
                      config['settings']['vnext'][0]['users'][0]['flow'] = flow
              valid_fps = {"chrome", "firefox", "safari", "ios", "android", "edge", "360", "qq", "random", "randomized", ""}
              
              if sec == 'tls':
                  fp_val = clean_str(params.get('fp', ['chrome'])[0]).lower()
                  if fp_val not in valid_fps: fp_val = "chrome"
                      
                  config['streamSettings']['security'] = 'tls'
                  config['streamSettings']['tlsSettings'] = {
                      "serverName": clean_str(params.get('sni', [server])[0]),
                      "fingerprint": fp_val
                  }
                  alpn = clean_str(params.get('alpn', [''])[0])
                  if alpn: config['streamSettings']['tlsSettings']['alpn'] = alpn.split(',')
              elif sec == 'reality':
                  pbk = clean_str(params.get('pbk', [''])[0])
                  if not is_valid_reality_pbk(pbk): raise Exception("Invalid/Mangled REALITY pbk")
                  
                  fp_val = clean_str(params.get('fp', ['chrome'])[0]).lower()
                  if fp_val not in valid_fps: fp_val = "chrome"
                  
                  sid = clean_str(params.get('sid', [''])[0])
                  if sid and (len(sid) > 16 or len(sid) % 2 != 0 or not all(c in '0123456789abcdefABCDEF' for c in sid)):
                      raise Exception(f"Invalid/Mangled REALITY shortId: {sid}")
                      
                  config['streamSettings']['security'] = 'reality'
                  config['streamSettings']['realitySettings'] = {
                      "serverName": clean_str(params.get('sni', [server])[0]),
                      "password": pbk,
                      "shortId": sid,
                      "spiderX": clean_path(params.get('spx', ['/'])[0]),
                      "fingerprint": fp_val
                  }

              if net_type == 'ws': 
                  config['streamSettings']['wsSettings'] = {
                      "path": clean_path(params.get('path', ['/'])[0]),
                      "headers": {"Host": clean_str(params.get('host', [server])[0])}
                  }
              elif net_type == 'httpupgrade':
                  config['streamSettings']['httpupgradeSettings'] = {
                      "path": clean_path(params.get('path', ['/'])[0]),
                      "host": clean_str(params.get('host', [server])[0])
                  }
              elif net_type == 'grpc':
                  config['streamSettings']['grpcSettings'] = {
                      "serviceName": clean_str(params.get('serviceName', [''])[0]),
                      "multiMode": True
                  }
              elif net_type == 'xhttp':
                  host_val = clean_str(params.get('host', [server])[0])
                  path_val = clean_path(params.get('path', ['/'])[0])
                  if not host_val: host_val = server
                  if not path_val or path_val == '/': path_val = '/'
                  
                  if '@' in host_val or ' ' in host_val or '{' in host_val:
                      raise Exception("Malformed XHTTP Host")
                  
                  mode_val = clean_str(params.get('mode', ['auto'])[0])
                  if not mode_val: mode_val = "auto"

                  xhttp_settings = {
                      "path": path_val,
                      "host": host_val,
                      "mode": mode_val,
                      "headers": {"User-Agent": "Mozilla/5.0"}
                  }
                  
                  extra_str = params.get('extra', [''])[0]
                  if extra_str:
                      try:
                          parsed_extra = json.loads(urllib.parse.unquote(extra_str))
                          if isinstance(parsed_extra, dict):
                              if "headers" in parsed_extra and isinstance(parsed_extra["headers"], str):
                                  del parsed_extra["headers"]
                              xhttp_settings["extra"] = parsed_extra
                      except: 
                          raise Exception("Malformed XHTTP extra JSON (corrupted by scraper)")

                  config['streamSettings']['xhttpSettings'] = xhttp_settings
              return config, server, name

          def parse_vmess(link, index):
              decoded = decode_base64(link.replace("vmess://", ""))
              if not decoded: raise Exception("Invalid vmess")
              j = json.loads(decoded)
              name = j.get('ps', f"proxy-{index}")
              server = j.get('add', '')
              uuid = j.get('id', '')
              if not server: raise Exception("Missing server")
              if not is_valid_uuid_or_id(uuid): raise Exception("Invalid VMess UUID")

              allow_insecure = clean_str(j.get('allowInsecure', '')).lower()
              skip_cert = clean_str(j.get('skip-cert-verify', '')).lower()
              if j.get('allowInsecure') is True or j.get('skip-cert-verify') is True or allow_insecure in ['1', 'true'] or skip_cert in ['1', 'true']:
                  raise Exception("Skipping insecure VMess node")
              
              try: port = int(j.get('port', 443))
              except: port = 443
              if not (1 <= port <= 65535): raise Exception("Invalid port bounds")
              try: aid = int(j.get('aid', 0))
              except: aid = 0

              scy = clean_str(j.get('scy', 'auto')).lower()
              if scy not in ["aes-128-gcm", "chacha20-poly1305", "auto", "none", "zero"]:
                  raise Exception(f"Invalid VMess security: {scy}")

              net = clean_str(j.get('net', 'tcp')).lower()
              if net in ["http", "h2"]: net = "xhttp"
              if net not in ["tcp", "ws", "grpc", "httpupgrade", "xhttp", "quic"]:
                  raise Exception(f"Invalid VMess network: {net}")
                  
              tls = clean_str(j.get('tls', '')).lower()
              if tls not in ["", "none", "tls", "reality"]:
                  raise Exception(f"Invalid VMess TLS: {tls}")

              config = {
                  "tag": f"out-{index}", "protocol": "vmess",
                  "settings": {
                      "vnext": [{"address": server, "port": port, "users": [{"id": uuid, "alterId": aid, "security": scy}]}]
                  },
                  "streamSettings": {"network": net}
              }
              if j.get('tls') == 'tls':
                  valid_fps = {"chrome", "firefox", "safari", "ios", "android", "edge", "360", "qq", "random", "randomized", ""}
                  fp_val = clean_str(j.get('fp', 'chrome')).lower()
                  if fp_val not in valid_fps: fp_val = "chrome"
                      
                  config['streamSettings']['security'] = 'tls'
                  config['streamSettings']['tlsSettings'] = {
                      "serverName": clean_str(j.get('sni', server)),
                      "fingerprint": fp_val
                  }
                  alpn = clean_str(j.get('alpn', ''))
                  if alpn: config['streamSettings']['tlsSettings']['alpn'] = alpn.split(',')
              
              if net == 'ws': 
                  config['streamSettings']['wsSettings'] = {
                      "path": clean_path(j.get('path', '/')),
                      "headers": {"Host": clean_str(j.get('host', server))}
                  }
              elif net == 'httpupgrade':
                  config['streamSettings']['httpupgradeSettings'] = {
                      "path": clean_path(j.get('path', '/')),
                      "host": clean_str(j.get('host', server))
                  }
              elif net == 'grpc':
                  config['streamSettings']['grpcSettings'] = {
                      "serviceName": clean_str(j.get('path', '')),
                      "multiMode": True
                  }
              elif net == 'xhttp':
                  host_val = clean_str(j.get('host', server))
                  path_val = clean_path(j.get('path', '/'))
                  if not host_val: host_val = server
                  if not path_val or path_val == '/': path_val = '/'
                  
                  if '@' in host_val or ' ' in host_val or '{' in host_val:
                      raise Exception("Malformed XHTTP Host")
                  
                  mode_val = clean_str(j.get('mode', 'auto'))
                  if not mode_val: mode_val = "auto"

                  xhttp_settings = {
                      "path": path_val,
                      "host": host_val,
                      "mode": mode_val,
                      "headers": {"User-Agent": "Mozilla/5.0"}
                  }
                  
                  extra_val = j.get('extra')
                  if extra_val:
                      try:
                          if isinstance(extra_val, str):
                              parsed_extra = json.loads(urllib.parse.unquote(extra_val))
                          elif isinstance(extra_val, dict):
                              parsed_extra = extra_val
                          else:
                              parsed_extra = {}
                              
                          if isinstance(parsed_extra, dict):
                              if "headers" in parsed_extra and isinstance(parsed_extra["headers"], str):
                                  del parsed_extra["headers"]
                              xhttp_settings["extra"] = parsed_extra
                      except: 
                          raise Exception("Malformed XHTTP extra JSON (corrupted by scraper)")

                  config['streamSettings']['xhttpSettings'] = xhttp_settings
              return config, server, name

          def parse_ss(link, index):
              parsed = urllib.parse.urlparse(link)
              name = urllib.parse.unquote(parsed.fragment) if parsed.fragment else f"proxy-{index}"
              netloc = parsed.netloc
              
              if '@' in netloc:
                  userinfo, server_port = netloc.rsplit('@', 1)
                  if ':' not in userinfo: userinfo = decode_base64(userinfo)
              else:
                  decoded = decode_base64(netloc)
                  if '@' in decoded: userinfo, server_port = decoded.rsplit('@', 1)
                  else: raise Exception("Invalid SS")
                      
              method, password = userinfo.split(':', 1)
              if not method or not password: raise Exception("Missing SS credentials")
              
              method = clean_str(method).lower()
              if method not in ALLOWED_SS_METHODS:
                  raise Exception(f"Shadowsocks method '{method}' is deprecated.")

              server, port_str = server_port.split(':', 1)
              if not server: raise Exception("Missing server")
              try: port = int(clean_str(port_str))
              except: port = 443
              if not (1 <= port <= 65535): raise Exception("Invalid port bounds")

              config = {
                  "tag": f"out-{index}", "protocol": "shadowsocks",
                  "settings": {"servers": [{"address": server, "port": port, "method": method, "password": clean_str(password)}]}
              }
              return config, server, name

          def parse_trojan(link, index):
              parsed = urllib.parse.urlparse(link)
              server = parsed.hostname
              if not server: raise Exception("Missing server")
              try: port = int(parsed.port or 443)
              except: port = 443
              if not (1 <= port <= 65535): raise Exception("Invalid port bounds")
              params = urllib.parse.parse_qs(parsed.query)
              name = urllib.parse.unquote(parsed.fragment) if parsed.fragment else f"proxy-{index}"
              
              password = urllib.parse.unquote(parsed.username) if parsed.username else ""
              password = clean_str(password)
              if not password: raise Exception("Missing trojan password")
              
              allow_insecure = clean_str(params.get('allowInsecure', ['0'])[0]).lower()
              insecure = clean_str(params.get('insecure', ['0'])[0]).lower()
              if allow_insecure in ['1', 'true'] or insecure in ['1', 'true']:
                  raise Exception("Skipping insecure Trojan node")

              net = clean_str(params.get('type', ['tcp'])[0]).lower()
              if net in ["http", "h2"]: net = "xhttp"
              if net not in ["tcp", "ws", "grpc", "httpupgrade", "xhttp", "quic"]:
                  raise Exception(f"Invalid Trojan network type: {net}")
                  
              sec = clean_str(params.get('security', ['tls'])[0]).lower()
              if sec not in ["none", "tls", "reality"]:
                  raise Exception(f"Invalid Trojan security: {sec}")

              config = {
                  "tag": f"out-{index}", "protocol": "trojan",
                  "settings": {"servers": [{"address": server, "port": port, "password": password}]},
                  "streamSettings": {"network": net}
              }
              if sec == 'tls':
                  valid_fps = {"chrome", "firefox", "safari", "ios", "android", "edge", "360", "qq", "random", "randomized", ""}
                  fp_val = clean_str(params.get('fp', ['chrome'])[0]).lower()
                  if fp_val not in valid_fps: fp_val = "chrome"
                      
                  config['streamSettings']['security'] = 'tls'
                  config['streamSettings']['tlsSettings'] = {
                      "serverName": clean_str(params.get('sni', [server])[0]),
                      "fingerprint": fp_val
                  }
                  alpn = clean_str(params.get('alpn', [''])[0])
                  if alpn: config['streamSettings']['tlsSettings']['alpn'] = alpn.split(',')
            
              if net == 'ws': 
                  config['streamSettings']['wsSettings'] = {
                      "path": clean_path(params.get('path', ['/'])[0]),
                      "headers": {"Host": clean_str(params.get('host', [server])[0])}
                  }
              elif net == 'httpupgrade':
                  config['streamSettings']['httpupgradeSettings'] = {
                      "path": clean_path(params.get('path', ['/'])[0]),
                      "host": clean_str(params.get('host', [server])[0])
                  }
              elif net == 'grpc':
                  config['streamSettings']['grpcSettings'] = {
                      "serviceName": clean_str(params.get('serviceName', [''])[0]),
                      "multiMode": True
                  }
              elif net == 'xhttp':
                  host_val = clean_str(params.get('host', [server])[0])
                  path_val = clean_path(params.get('path', ['/'])[0])
                  if not host_val: host_val = server
                  if not path_val or path_val == '/': path_val = '/'
                  
                  if '@' in host_val or ' ' in host_val or '{' in host_val:
                      raise Exception("Malformed XHTTP Host")
                  
                  mode_val = clean_str(params.get('mode', ['auto'])[0])
                  if not mode_val: mode_val = "auto"

                  xhttp_settings = {
                      "path": path_val,
                      "host": host_val,
                      "mode": mode_val,
                      "headers": {"User-Agent": "Mozilla/5.0"}
                  }
                  
                  extra_str = params.get('extra', [''])[0]
                  if extra_str:
                      try:
                          parsed_extra = json.loads(urllib.parse.unquote(extra_str))
                          if isinstance(parsed_extra, dict):
                              if "headers" in parsed_extra and isinstance(parsed_extra["headers"], str):
                                  del parsed_extra["headers"]
                              xhttp_settings["extra"] = parsed_extra
                      except: 
                          raise Exception("Malformed XHTTP extra JSON (corrupted by scraper)")

                  config['streamSettings']['xhttpSettings'] = xhttp_settings
              return config, server, name

          def test_node(port):
              proxies = {"http": f"http://127.0.0.1:{port}", "https": f"http://127.0.0.1:{port}"}
              delay, speed = 0, 0
              try:
                  start = time.time()
                  resp = requests.head("http://www.gstatic.com/generate_204", proxies=proxies, timeout=5)
                  if resp.status_code == 204:
                      delay = int((time.time() - start) * 1000)
                      start = time.time()
                      with requests.get("https://speed.cloudflare.com/__down?bytes=5000000", proxies=proxies, timeout=5, stream=True) as r:
                          bytes_received = 0
                          for chunk in r.iter_content(8192):
                              bytes_received += len(chunk)
                              if time.time() - start > 8: break
                      duration = time.time() - start
                      if duration > 0: speed = int(bytes_received / duration)
              except Exception: pass
              return delay, speed

          parsers = {'vless://': parse_vless, 'vmess://': parse_vmess, 'ss://': parse_ss, 'trojan://': parse_trojan}

          try:
              start_idx = int(sys.argv[1])
              end_idx = int(sys.argv[2])
              with open('proxies.txt', 'r', encoding='utf-8') as f: 
                  links = [line.strip() for line in f if line.strip()]
              
              links = links[start_idx:end_idx]
              parsed_nodes = []
              for i, link in enumerate(links):
                  for prefix, p_func in parsers.items():
                      if link.startswith(prefix):
                          try:
                              cfg, srv, name = p_func(link, start_idx + i)
                              parsed_nodes.append({"link": link, "config": cfg, "server": srv, "tag": cfg['tag'], "name": name})
                          except Exception: pass
                          break

              print(f"Parsed {len(parsed_nodes)} nodes for chunk. Starting test via Xray...", flush=True)
              results, chunk_size = [], 150
              total_chunks = (len(parsed_nodes) + chunk_size - 1) // chunk_size

              for i in range(0, len(parsed_nodes), chunk_size):
                  chunk_index = (i // chunk_size) + 1
                  print(f"Testing batch {chunk_index}/{total_chunks}...", flush=True)
                  chunk = parsed_nodes[i:i+chunk_size]
                  inbounds, outbounds, rules = [], [{"protocol": "freedom", "tag": "direct"}], []
                  node_ports = []
                  for j, node in enumerate(chunk):
                      port = get_free_port()
                      node_ports.append(port)
                      inbounds.append({"tag": f"in-{j}", "port": port, "protocol": "http", "listen": "127.0.0.1", "settings": {"allowTransparent": False}})
                      outbounds.append(node['config'])
                      rules.append({"inboundTag": [f"in-{j}"], "outboundTag": node['tag']})

                  with open('config.json', 'w') as f:
                      json.dump({"log": {"loglevel": "warning"}, "inbounds": inbounds, "outbounds": outbounds, "routing": {"rules": rules}}, f)

                  proc = subprocess.Popen(['./xray', 'run', '-c', 'config.json'], stdout=subprocess.PIPE, stderr=subprocess.PIPE)
                  time.sleep(2.0) 
                  
                  if proc.poll() is not None:
                      out, err = proc.communicate()
                      print(f"⚠️ XRAY CRASHED ON BATCH {chunk_index}! Skipping batch. Error:\n{err.decode('utf-8', errors='ignore')}\n{out.decode('utf-8', errors='ignore')}", flush=True)
                      continue

                  with concurrent.futures.ThreadPoolExecutor(max_workers=64) as executor:
                      futures = {executor.submit(test_node, node_ports[j]): node for j, node in enumerate(chunk)}
                      for future in concurrent.futures.as_completed(futures):
                          node, (delay, speed) = futures[future], future.result()
                          results.append({"tag": node['name'], "delay": delay, "avg_speed": speed, "link": node['link'], "server": node['server']})

                  proc.kill()
                  proc.wait()

              output_file = f"meta_chunk_{start_idx}.json"
              with open(output_file, 'w') as f: json.dump(results, f, indent=2)
              print(f"Testing complete. Results saved to {output_file}", flush=True)
          except FileNotFoundError:
              print("proxies.txt not found", flush=True); sys.exit(1)
          EOF
          
          python xray_tester.py ${{ matrix.start }} ${{ matrix.end }}

      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk-result-${{ matrix.start }}
          path: meta_chunk_${{ matrix.start }}.json
          retention-days: 1

  merge-and-publish:
    name: Merge Results and Publish
    needs: test-chunk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geoip2

      - name: Download GeoLite2 Country Database
        run: |
          MAX_RETRIES=2
          RETRY_COUNT=0
          PRIMARY_URL="https://git.io/GeoLite2-Country.mmdb"
          FALLBACK_URL="https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
          OUTPUT_FILE="utils/GeoLite2-Country.mmdb"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            wget -O "$OUTPUT_FILE" "$PRIMARY_URL" && break
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 3
          done

          if [ ! -s "$OUTPUT_FILE" ]; then
            wget -O "$OUTPUT_FILE" "$FALLBACK_URL" || exit 1
          fi

      - name: Download all processed chunks
        uses: actions/download-artifact@v4
        with:
          path: processed_chunks/
          pattern: chunk-result-*
          merge-multiple: true

      - name: Merge JSON files
        run: |
          cat <<'EOF' > merge.py
          import json, glob, os
          all_data = []
          for f in glob.glob('processed_chunks/*.json'):
              with open(f, 'r') as file:
                  all_data.extend(json.load(file))
          with open('meta.json', 'w') as out:
              json.dump(all_data, out, indent=2)
          print(f'Merged {len(all_data)} tested nodes from all workers.')
          EOF
          python merge.py

      - name: Process Test Results
        run: |
          echo "Processing metadata, sorting, and creating geo-balanced lists..."
          python utils/speedtest/process_results.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin ${{ github.ref_name }}
          git add Eternity Eternity.txt Diversity Diversity.txt Resilience.txt Resilience full.txt full_base64.txt LogInfo.txt sub/
          if ! git diff --staged --quiet; then
            git commit -m "✔️ Updated proxy lists"
            git push
          else
            echo "No changes to commit."
          fi
          
      - name: Trigger Run
        if: success()
        env:
          GH_TOKEN: ${{ secrets.VPB_PAT }}
        run: |
          echo "Triggering run_bot.yml"
          gh workflow run run_bot.yml --repo VPNforWindowsSub/VPB --ref main
