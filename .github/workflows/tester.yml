name: Test Proxies

on:
  workflow_dispatch:

jobs:
  test-and-sort-proxies:
    name: Test and Sort Proxies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geoip2 requests

      - name: Download GeoLite2 Country Database
        run: |
          MAX_RETRIES=2
          RETRY_COUNT=0
          PRIMARY_URL="https://git.io/GeoLite2-Country.mmdb"
          FALLBACK_URL="https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
          OUTPUT_FILE="utils/GeoLite2-Country.mmdb"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            wget -O "$OUTPUT_FILE" "$PRIMARY_URL" && break
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 3
          done

          if [ ! -s "$OUTPUT_FILE" ]; then
            wget -O "$OUTPUT_FILE" "$FALLBACK_URL" || exit 1
          fi

      - name: Prepare Proxy List from Local File
        run: |
          echo "Decoding the list to raw proxy links..."
          base64 -d ./sub/sub_merge_base64.txt > proxies.txt
          echo "Total proxies prepared for testing: $(wc -l < proxies.txt)"

      - name: Download Xray Core
        run: |
          echo "Downloading Xray-core v26.3.27..."
          wget -O xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip xray.zip xray
          chmod +x xray

      - name: Run Xray Tester
        run: |
          cat <<'EOF' > xray_tester.py
          import json
          import urllib.parse
          import base64
          import time
          import subprocess
          import concurrent.futures
          import requests
          import sys

          def decode_base64(s):
              s = s.strip().split('#')[0]
              s += '=' * (-len(s) % 4)
              s = s.replace('-', '+').replace('_', '/')
              try:
                  return base64.b64decode(s).decode('utf-8', errors='ignore')
              except:
                  return ""

          def parse_vless(link, index):
              parsed = urllib.parse.urlparse(link)
              uuid, server = parsed.username, parsed.hostname
              port = parsed.port or 443
              params = urllib.parse.parse_qs(parsed.query)
              name = urllib.parse.unquote(parsed.fragment) if parsed.fragment else f"proxy-{index}"

              config = {
                  "tag": f"out-{index}", "protocol": "vless",
                  "settings": {
                      "vnext": [{"address": server, "port": int(port), "users": [{"id": uuid, "encryption": "none"}]}]
                  },
                  "streamSettings": {"network": params.get('type', ['tcp'])[0]}
              }
              
              flow = params.get('flow', [''])[0]
              if flow:
                  config['settings']['vnext'][0]['users'][0]['flow'] = flow

              sec = params.get('security', ['none'])[0]
              if sec == 'tls':
                  config['streamSettings']['security'] = 'tls'
                  config['streamSettings']['tlsSettings'] = {"serverName": params.get('sni', [server])[0], "allowInsecure": True, "fingerprint": params.get('fp', ['chrome'])[0]}
                  alpn = params.get('alpn', [''])[0]
                  if alpn: config['streamSettings']['tlsSettings']['alpn'] = alpn.split(',')
              elif sec == 'reality':
                  config['streamSettings']['security'] = 'reality'
                  config['streamSettings']['realitySettings'] = {"serverName": params.get('sni', [server])[0], "password": params.get('pbk', [''])[0], "shortId": params.get('sid', [''])[0], "spiderX": params.get('spx', ['/'])[0], "fingerprint": params.get('fp', ['chrome'])[0]}

              net = config['streamSettings']['network']
              if net == 'ws':
                  config['streamSettings']['wsSettings'] = {"path": params.get('path', ['/'])[0], "headers": {"Host": params.get('host', [server])[0]}}
              elif net == 'grpc':
                  config['streamSettings']['grpcSettings'] = {"serviceName": params.get('serviceName', [''])[0], "multiMode": True}
              return config, server, name

          def parse_vmess(link, index):
              decoded = decode_base64(link.replace("vmess://", ""))
              if not decoded: raise Exception("Invalid vmess")
              j = json.loads(decoded)
              name = j.get('ps', f"proxy-{index}")
              server = j.get('add', '')
              config = {
                  "tag": f"out-{index}", "protocol": "vmess",
                  "settings": {
                      "vnext": [{"address": server, "port": int(j.get('port', 443)), "users": [{"id": j.get('id', ''), "alterId": int(j.get('aid', 0)), "security": j.get('scy', 'auto')}]}]
                  },
                  "streamSettings": {"network": j.get('net', 'tcp')}
              }
              if j.get('tls') == 'tls':
                  config['streamSettings']['security'] = 'tls'
                  config['streamSettings']['tlsSettings'] = {"serverName": j.get('sni', server), "allowInsecure": True}
                  alpn = j.get('alpn', '')
                  if alpn: config['streamSettings']['tlsSettings']['alpn'] = alpn.split(',')
              if j.get('net') == 'ws':
                  config['streamSettings']['wsSettings'] = {"path": j.get('path', '/'), "headers": {"Host": j.get('host', server)}}
              elif j.get('net') == 'grpc':
                  config['streamSettings']['grpcSettings'] = {"serviceName": j.get('path', ''), "multiMode": True}
              return config, server, name

          def parse_ss(link, index):
              parsed = urllib.parse.urlparse(link)
              name = urllib.parse.unquote(parsed.fragment) if parsed.fragment else f"proxy-{index}"
              if parsed.username:
                  user_pass = urllib.parse.unquote(parsed.username)
                  if ':' not in user_pass: user_pass = decode_base64(user_pass)
                  method, password = user_pass.split(':', 1)
                  server, port = parsed.hostname, parsed.port
              else:
                  user_pass, server_port = decode_base64(parsed.netloc).rsplit('@', 1)
                  method, password = user_pass.split(':', 1)
                  server, port = server_port.split(':', 1)
              config = {
                  "tag": f"out-{index}", "protocol": "shadowsocks",
                  "settings": {"servers": [{"address": server, "port": int(port), "method": method, "password": password}]}
              }
              return config, server, name

          def parse_trojan(link, index):
              parsed = urllib.parse.urlparse(link)
              server = parsed.hostname
              port = parsed.port or 443
              params = urllib.parse.parse_qs(parsed.query)
              name = urllib.parse.unquote(parsed.fragment) if parsed.fragment else f"proxy-{index}"
              config = {
                  "tag": f"out-{index}", "protocol": "trojan",
                  "settings": {"servers": [{"address": server, "port": int(port), "password": urllib.parse.unquote(parsed.username)}]},
                  "streamSettings": {"network": params.get('type', ['tcp'])[0]}
              }
              if params.get('security', ['tls'])[0] == 'tls':
                  config['streamSettings']['security'] = 'tls'
                  config['streamSettings']['tlsSettings'] = {"serverName": params.get('sni', [server])[0], "allowInsecure": True}
                  alpn = params.get('alpn', [''])[0]
                  if alpn: config['streamSettings']['tlsSettings']['alpn'] = alpn.split(',')
                  
              net = config['streamSettings']['network']
              if net == 'ws':
                  config['streamSettings']['wsSettings'] = {"path": params.get('path', ['/'])[0], "headers": {"Host": params.get('host', [server])[0]}}
              elif net == 'grpc':
                  config['streamSettings']['grpcSettings'] = {"serviceName": params.get('serviceName', [''])[0], "multiMode": True}
              return config, server, name

          def test_node(port):
              proxies = {"http": f"http://127.0.0.1:{port}", "https": f"http://127.0.0.1:{port}"}
              delay, speed = 0, 0
              try:
                  start = time.time()
                  resp = requests.head("http://www.gstatic.com/generate_204", proxies=proxies, timeout=5)
                  if resp.status_code == 204:
                      delay = int((time.time() - start) * 1000)
                      start = time.time()
                      r = requests.get("https://speed.cloudflare.com/__down?bytes=5000000", proxies=proxies, timeout=10, stream=True)
                      bytes_received = 0
                      for chunk in r.iter_content(8192): bytes_received += len(chunk)
                      duration = time.time() - start
                      if duration > 0: speed = int(bytes_received / duration)
              except Exception:
                  pass
              return delay, speed

          parsers = {'vless://': parse_vless, 'vmess://': parse_vmess, 'ss://': parse_ss, 'trojan://': parse_trojan}

          try:
              with open('proxies.txt', 'r', encoding='utf-8') as f: links = [line.strip() for line in f if line.strip()]
              parsed_nodes = []
              for i, link in enumerate(links):
                  for prefix, p_func in parsers.items():
                      if link.startswith(prefix):
                          try:
                              cfg, srv, name = p_func(link, i)
                              parsed_nodes.append({"link": link, "config": cfg, "server": srv, "tag": cfg['tag'], "name": name})
                          except Exception as e: pass
                          break

              print(f"Parsed {len(parsed_nodes)} nodes. Starting test via Xray-core...")
              results, chunk_size = [], 150
              
              for i in range(0, len(parsed_nodes), chunk_size):
                  chunk = parsed_nodes[i:i+chunk_size]
                  inbounds, outbounds, rules = [], [{"protocol": "freedom", "tag": "direct"}], []
                  for j, node in enumerate(chunk):
                      port = 30000 + j
                      inbounds.append({"tag": f"in-{j}", "port": port, "protocol": "http", "listen": "127.0.0.1"})
                      outbounds.append(node['config'])
                      rules.append({"inboundTag": [f"in-{j}"], "outboundTag": node['tag']})

                  with open('config.json', 'w') as f:
                      json.dump({"log": {"loglevel": "error"}, "inbounds": inbounds, "outbounds": outbounds, "routing": {"rules": rules}}, f)

                  proc = subprocess.Popen(['./xray', '-c', 'config.json'], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  time.sleep(2.0) # Ensure Xray has fully bound all ports before shooting requests

                  with concurrent.futures.ThreadPoolExecutor(max_workers=64) as executor:
                      futures = {executor.submit(test_node, 30000 + j): node for j, node in enumerate(chunk)}
                      for future in concurrent.futures.as_completed(futures):
                          node, (delay, speed) = futures[future], future.result()
                          results.append({"tag": node['name'], "delay": delay, "avg_speed": speed, "link": node['link'], "server": node['server']})

                  proc.terminate()
                  proc.wait()

              with open('meta.json', 'w') as f: json.dump(results, f, indent=2)
              print("Testing complete. Results saved to meta.json")
          except FileNotFoundError:
              print("proxies.txt not found"); sys.exit(1)
          EOF
          python xray_tester.py

      - name: Process Test Results
        run: |
          echo "Processing metadata, sorting, and creating geo-balanced lists..."
          python utils/speedtest/process_results.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin ${{ github.ref_name }}
          git add Eternity Eternity.txt EternityBase full.txt full_base64.txt LogInfo.txt sub/
          if ! git diff --staged --quiet; then
            git commit -m "✔️ Updated proxy lists via Xray Core"
            git push
          else
            echo "No changes to commit."
          fi
