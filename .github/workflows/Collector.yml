name: Collect

on:
  workflow_dispatch:
  push:
    paths:
      - "./sub/sub_merge_base64.txt"
      - "./sub/sub_merge_yaml.yml"

jobs:
  prepare-matrix:
    name: Prepare Collector Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - id: set-matrix
        run: |
          # Count active sources in sub_list.json (excluding ID 5, the airport)
          TOTAL=$(jq '[.[] | select(.enabled == true and .id != 5)] | length' ./sub/sub_list.json)
          echo "Total active sources: $TOTAL"
          
          # Spin up 10 workers for downloading subscriptions concurrently
          WORKERS=10
          CHUNK_SIZE=$(( (TOTAL + WORKERS - 1) / WORKERS ))
          echo "Chunk size per worker: $CHUNK_SIZE"
          
          CHUNKS=$(for i in $(seq 0 $CHUNK_SIZE $(($TOTAL - 1)) ); do
            START=$i
            END=$(($i + $CHUNK_SIZE))
            echo "{\"start\":${START},\"end\":${END}}"
          done | paste -sd, -)
          
          echo "matrix={\"include\":[${CHUNKS}]}" >> $GITHUB_OUTPUT

  collect-chunk:
    name: Collect Sources (${{ matrix.start }} to ${{ matrix.end }})
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r ./utils/requirements.txt

      - name: Run Collector for Chunk
        run: |
          wget -O subconverter.tar.gz https://github.com/asdlokj1qpi233/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -zxvf subconverter.tar.gz -C ./
          chmod +x ./subconverter/subconverter && nohup ./subconverter/subconverter >./subconverter.log 2>&1 &
          sleep 2
          
          cat <<'EOF' > utils/chunk_collector.py
          import sys, os, re, json, base64, urllib.parse, yaml, requests
          from requests.adapters import HTTPAdapter
          from list_merge import sub_merge

          def dict_to_uri(p):
              try:
                  ptype = p.get('type', '').lower()
                  name = urllib.parse.quote(p.get('name', ''))
                  server = p.get('server', '')
                  port = p.get('port', '')
                  if not server or not port: return None

                  if ptype == 'ss':
                      method = p.get('cipher', p.get('method', ''))
                      password = p.get('password', '')
                      cred = base64.b64encode(f"{method}:{password}".encode()).decode('ascii')
                      return f"ss://{cred}@{server}:{port}#{name}"

                  elif ptype == 'vmess':
                      v = {
                          "v": "2", "ps": p.get('name', ''), "add": server, "port": port,
                          "id": p.get('uuid', ''), "aid": p.get('alterId', 0),
                          "scy": p.get('cipher', 'auto'), "net": p.get('network', 'tcp'),
                          "type": "none", "tls": "tls" if p.get('tls') else ""
                      }
                      if p.get('sni') or p.get('servername'): v['sni'] = p.get('sni', p.get('servername'))
                      if 'ws-opts' in p:
                          v['path'] = p['ws-opts'].get('path', '/')
                          v['host'] = p['ws-opts'].get('headers', {}).get('Host', '')
                      elif 'grpc-opts' in p:
                          v['path'] = p['grpc-opts'].get('grpc-service-name', '')
                      
                      b64 = base64.b64encode(json.dumps({k:v for k,v in v.items() if v}).encode()).decode('ascii')
                      return f"vmess://{b64}"

                  elif ptype in ['vless', 'trojan']:
                      password = p.get('uuid', '') if ptype == 'vless' else p.get('password', '')
                      params = {}
                      net = p.get('network', 'tcp')
                      if net != 'tcp': params['type'] = net
                      if p.get('tls'): params['security'] = 'tls'
                      if p.get('sni') or p.get('servername'): params['sni'] = p.get('sni', p.get('servername'))
                      if p.get('flow'): params['flow'] = p.get('flow')
                      if p.get('client-fingerprint'): params['fp'] = p.get('client-fingerprint')

                      if net == 'ws' and 'ws-opts' in p:
                          params['path'] = p['ws-opts'].get('path', '/')
                          host = p['ws-opts'].get('headers', {}).get('Host', '')
                          if host: params['host'] = host
                      elif net == 'grpc' and 'grpc-opts' in p:
                          params['serviceName'] = p['grpc-opts'].get('grpc-service-name', '')

                      qs = urllib.parse.urlencode({k:v for k,v in params.items() if v})
                      return f"{ptype}://{password}@{server}:{port}?{qs}#{name}"
              except Exception:
                  pass
              return None

          start_idx = int(sys.argv[1])
          end_idx = int(sys.argv[2])
          output_path = f"chunk_{start_idx}"
          
          # Load and filter list
          sub_list = sub_merge.read_list('./sub/sub_list.json')
          chunk = list(filter(lambda x: x['id'] != 5, sub_list))[start_idx:end_idx]
          if not chunk: sys.exit(0)

          session = requests.Session()
          session.mount('http://', HTTPAdapter(max_retries=2))
          session.mount('https://', HTTPAdapter(max_retries=2))

          all_clash_proxies = []
          for url_container in chunk:
              ids = url_container['id']
              repo_links = []
              
              for each_url in url_container.get("url", []):
                  print(f"===> Processing URL: {each_url}", flush=True)
                  try:
                      resp = session.get(each_url, timeout=15)
                      resp.raise_for_status()
                      text = resp.text
                      extracted = []
                      
                      # 1. Native YAML/JSON Clash Parsing
                      try:
                          data = yaml.safe_load(text)
                          if isinstance(data, dict) and 'proxies' in data:
                              for p in data['proxies']:
                                  if isinstance(p, dict):
                                      uri = dict_to_uri(p)
                                      if uri: extracted.append(uri)
                      except Exception:
                          pass

                      # 2. Direct Regex (Plain Text)
                      matches = re.finditer(r'(vless|vmess|trojan|ss|ssr)://([^\s<>"\'`]+)', text)
                      for m in matches: extracted.append(f"{m.group(1)}://{m.group(2)}")
                          
                      # 3. Base64 Decode Regex
                      try:
                          b64_text = text.strip()
                          b64_text += '=' * (-len(b64_text) % 4)
                          b64_text = b64_text.replace('-', '+').replace('_', '/')
                          decoded = base64.b64decode(b64_text).decode('utf-8', errors='ignore')
                          matches_b64 = re.finditer(r'(vless|vmess|trojan|ss|ssr)://([^\s<>"\'`]+)', decoded)
                          for m in matches_b64: extracted.append(f"{m.group(1)}://{m.group(2)}")
                      except Exception:
                          pass
                          
                      # 4. Fallback Subconverter
                      if not extracted:
                          print(f"No direct links found, falling back to subconverter...", flush=True)
                          try:
                              sc_resp = session.post("http://127.0.0.1:25500/sub?target=mixed", data=text.encode('utf-8'), timeout=15)
                              if sc_resp.status_code == 200:
                                  decoded_sc = base64.b64decode(sc_resp.text.strip()).decode('utf-8', errors='ignore')
                                  matches_sc = re.finditer(r'(vless|vmess|trojan|ss|ssr)://([^\s<>"\'`]+)', decoded_sc)
                                  for m in matches_sc: extracted.append(f"{m.group(1)}://{m.group(2)}")
                          except Exception: pass
                              
                      extracted = list(set(extracted))
                      print(f"Found {len(extracted)} links from {each_url}", flush=True)
                      repo_links.extend(extracted)
                  except Exception as e:
                      print(f"Failed to process {each_url}: {e}", flush=True)
              
              repo_links = list(set(repo_links))
              os.makedirs('./sub/list/', exist_ok=True)
              with open(f'./sub/list/{ids:02d}.txt', 'w', encoding='utf-8') as f: f.write("\n".join(repo_links))
              for link in repo_links: all_clash_proxies.append({"link": link})
          
          unique_links = list(set([p['link'] for p in all_clash_proxies]))
          os.makedirs('./sub/', exist_ok=True)
          with open(f'./sub/{output_path}.yml', 'w', encoding='utf-8') as f:
              yaml.dump({'proxies': [{"type": p.split("://")[0]} for p in unique_links]}, f, default_flow_style=False, sort_keys=False)
          with open(f'./sub/{output_path}_base64.txt', 'w', encoding='utf-8') as f:
              f.write(base64.b64encode("\n".join(unique_links).encode('utf-8')).decode('ascii'))
          print(f"Successfully wrote {len(unique_links)} nodes.", flush=True)
          EOF
          python utils/chunk_collector.py ${{ matrix.start }} ${{ matrix.end }}

      - name: Upload Chunk Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: collected-chunk-${{ matrix.start }}
          path: |
            sub/chunk_${{ matrix.start }}*
            sub/list/*.txt
          retention-days: 1

  merge-collection:
    name: Merge Collection
    needs: collect-chunk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: |
          pip install -r ./utils/requirements.txt
          pip install pyyaml

      - name: Download all collected chunks
        uses: actions/download-artifact@v4
        with:
          path: downloaded_chunks/
          pattern: collected-chunk-*
          merge-multiple: true

      - name: Merge and format lists
        run: |
          mkdir -p ./sub/list/
          mv downloaded_chunks/list/[0-9][0-9].txt ./sub/list/ 2>/dev/null || true
          
          cat <<'EOF' > utils/global_merge.py
          import glob
          import base64
          import yaml
          import random

          # Hard cap to ensure we never hit GitHub's 100MB file limit
          MAX_NODES = 225000

          unique_links = set()
          all_links = []

          print("Starting global deduplication across all chunks...")
          
          for f in glob.glob('downloaded_chunks/*_base64.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  b64_content = file.read().strip()
                  if not b64_content: continue
                  
                  decoded = base64.b64decode(b64_content).decode('utf-8', errors='ignore')
                  for link in decoded.splitlines():
                      link = link.strip()
                      if link and link not in unique_links:
                          unique_links.add(link)
                          all_links.append(link)

          original_count = len(all_links)
          
          # Randomly shuffle the entire proxy pool.
          # This ensures that no specific section of providers or sources gets permanently truncated.
          random.shuffle(all_links)

          all_links = all_links[:MAX_NODES] # Apply Hard Cap

          print(f"Global deduplication complete.")
          print(f"Total unique nodes: {original_count}")
          if original_count > MAX_NODES:
              print(f"⚠️ Limit reached! Capped and randomized to {MAX_NODES} to prevent GitHub 100MB limit crash.")

          # 1. Write Plain Text
          with open('./sub/sub_merge.txt', 'w', encoding='utf-8') as out:
              out.write('\n'.join(all_links))

          # 2. Write Base64
          with open('./sub/sub_merge_base64.txt', 'w', encoding='utf-8') as out:
              out.write(base64.b64encode('\n'.join(all_links).encode('utf-8')).decode('ascii'))

          # 3. Write YAML
          yaml_proxies = [{"type": link.split("://")[0]} for link in all_links]
          with open('./sub/sub_merge_yaml.yml', 'w', encoding='utf-8') as out:
              yaml.dump({'proxies': yaml_proxies}, out, allow_unicode=True, default_flow_style=False, sort_keys=False)

          EOF
          python utils/global_merge.py
          
          # Run README update
          cat <<'EOF' > utils/update_readme.py
          from list_merge import sub_merge
          sub_list = sub_merge.read_list('./sub/sub_list.json')
          sub_merge.readme_update('./README.md', sub_list)
          EOF
          python utils/update_readme.py
          
      - name: Log VLESS Count After Collection
        run: |
          echo "--- Verifying proxy file after collection ---"
          VLESS_COUNT=$(grep -c "type: vless" ./sub/sub_merge_yaml.yml || echo "0")
          echo "-> [Collector.yml] VLESS nodes in sub_merge_yaml.yml: $VLESS_COUNT"
          echo "--------------------------------------------"

      - name: Commit Collection Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git pull origin master
          git add ./sub/sub_merge_base64.txt ./sub/sub_merge_yaml.yml ./sub/sub_merge.txt ./README.md ./sub/list/
          if ! git diff-index --quiet HEAD; then
            git commit -m "✔️ $(date '+%Y-%m-%d %H:%M:%S') Collected (Matrix)"
            git push origin master
          else
            echo "No collection changes to commit."
          fi

      - name: Trigger Tester Workflow
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering the tester.yml workflow on the master branch..."
          gh workflow run tester.yml --ref master
